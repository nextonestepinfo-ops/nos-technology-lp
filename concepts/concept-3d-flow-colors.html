<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NosTechnology｜仕組み化（ワークフロー）— 配色比較</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<style>
  :root{--paper:#f3f2ee;--ink:#14161a;--ink-soft:#5b626c;--mint:#16b89a;--blue:#3f6df0;--lav:#7b6cf0;
    --line:color-mix(in srgb,var(--ink) 12%,transparent);--glass:color-mix(in srgb,var(--paper) 62%,transparent);
    --en:"Space Grotesk",sans-serif;--jp:"Zen Kaku Gothic New",system-ui,sans-serif;--ease:cubic-bezier(.16,1,.3,1);}
  *{box-sizing:border-box;margin:0;}
  body{background:var(--paper);color:var(--ink);font-family:var(--jp);line-height:1.85;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-feature-settings:"palt" 1;transition:background .6s var(--ease),color .6s var(--ease);}
  a{color:inherit;text-decoration:none;}::selection{background:var(--ink);color:var(--paper);}
  @media(hover:hover)and(pointer:fine){body,a,button,[data-mag]{cursor:none;}}
  .cur{position:fixed;top:0;left:0;z-index:60;pointer-events:none;}
  .cur i,.cur b{position:absolute;border-radius:50%;transform:translate(-50%,-50%);}
  .cur i{width:6px;height:6px;background:var(--ink);}
  .cur b{width:38px;height:38px;border:1px solid color-mix(in srgb,var(--ink) 35%,transparent);transition:width .3s,height .3s,background .3s,border-color .3s;}
  .cur.hov b{width:64px;height:64px;background:color-mix(in srgb,var(--ink) 8%,transparent);border-color:transparent;}.cur.hov i{opacity:0;}
  @media(hover:none),(pointer:coarse){.cur{display:none;}}
  header{position:fixed;inset:0 0 auto 0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:24px clamp(22px,5vw,72px);transition:.4s var(--ease);}
  header.scr{padding-top:14px;padding-bottom:14px;background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;}
  .brand i{width:22px;height:22px;border-radius:7px;background:conic-gradient(from 200deg,var(--mint),var(--blue),var(--lav),var(--mint));transition:background .6s var(--ease);}
  nav{display:flex;gap:30px;font-family:var(--en);font-size:.9rem;color:var(--ink-soft);}nav a:hover{color:var(--ink);}
  .ncta{padding:9px 20px;border-radius:999px;border:1px solid var(--ink);color:var(--ink);transition:.35s var(--ease);}.ncta:hover{background:var(--ink);color:var(--paper);}
  @media(max-width:820px){nav .lnk{display:none;}}
  .hero{position:relative;min-height:100svh;display:flex;align-items:center;padding:140px clamp(22px,5vw,72px) 110px;overflow:hidden;}
  .hero__gl{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
  .hero__c{position:relative;z-index:2;max-width:600px;pointer-events:none;}
  .hero__c a,.hero__c [data-mag]{pointer-events:auto;}
  .badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--en);font-size:.78rem;letter-spacing:.04em;padding:7px 14px;border-radius:999px;background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(6px);color:var(--ink-soft);margin-bottom:24px;}
  .badge i{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 10px var(--mint);}
  h1{font-weight:900;font-size:clamp(2.6rem,7.6vw,6rem);line-height:1.06;letter-spacing:.004em;margin-bottom:28px;}
  h1 .ln{display:block;overflow:hidden;}h1 .ln>span{display:inline-block;transform:translateY(110%);transition:transform 1s var(--ease);}
  h1 .ln.in>span{transform:none;}h1 .ln:nth-child(2)>span{transition-delay:.1s;}
  h1 em{font-style:normal;background:linear-gradient(110deg,var(--mint),var(--blue),var(--lav));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .lead{max-width:480px;color:var(--ink-soft);font-size:clamp(1rem,1.4vw,1.12rem);margin-bottom:36px;}
  .actions{display:flex;flex-wrap:wrap;gap:14px;}
  .btn{position:relative;display:inline-flex;align-items:center;gap:9px;padding:16px 30px;border-radius:999px;font-weight:600;font-size:.98rem;border:1px solid transparent;overflow:hidden;isolation:isolate;transition:color .4s var(--ease),border-color .4s var(--ease);}
  .btn>span{position:relative;z-index:1;}.btn::before{content:"";position:absolute;inset:0;z-index:0;transform:scaleY(0);transform-origin:bottom;transition:transform .45s var(--ease);}.btn:hover::before{transform:scaleY(1);}
  .btn--fill{background:var(--ink);color:var(--paper);}.btn--fill::before{background:linear-gradient(120deg,var(--mint),var(--blue));}.btn--fill:hover{color:var(--paper);}
  .btn--ghost{border-color:var(--line);color:var(--ink);}.btn--ghost::before{background:var(--ink);}.btn--ghost:hover{color:var(--paper);border-color:var(--ink);}
  .sw{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:min(94vw,620px);padding:12px 16px;border-radius:22px;background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--line);}
  .sw__t{position:absolute;top:-24px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:var(--en);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .chip{display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;padding:2px;}
  .chip b{width:34px;height:34px;border-radius:10px;border:1px solid transparent;display:grid;place-items:center;box-shadow:0 2px 10px rgba(0,0,0,.16);transition:border-color .3s var(--ease),transform .3s var(--ease),box-shadow .3s var(--ease);}
  .chip b u{width:15px;height:15px;border-radius:50%;display:block;}
  .chip.on b{border-color:var(--ink)!important;transform:scale(1.1);box-shadow:0 4px 16px rgba(0,0,0,.22);}
  .chip small{font-family:var(--en);font-size:.58rem;letter-spacing:.02em;color:var(--ink-soft);}
  .rv{opacity:0;transform:translateY(24px);transition:.9s var(--ease);}.rv.in{opacity:1;transform:none;}.rv.d1{transition-delay:.25s;}.rv.d2{transition-delay:.4s;}
  @media(prefers-reduced-motion:reduce){.rv,h1 .ln>span{opacity:1!important;transform:none!important;}.cur{display:none;}body{cursor:auto;}}
</style>
</head>
<body>
  <div class="cur" id="cur"><i></i><b></b></div>
  <header id="hd">
    <a class="brand" data-mag href="#"><i></i> NosTechnology</a>
    <nav><a class="lnk" href="#">仕組み</a><a class="lnk" href="#">3万円Web</a><a class="lnk" href="#">Works</a><a class="ncta" data-mag href="#">無料相談</a></nav>
  </header>

  <section class="hero">
    <canvas class="hero__gl" id="gl" aria-hidden="true"></canvas>
    <div class="hero__c">
      <span class="badge rv"><i></i> 集客から管理まで、ひとつながりに</span>
      <h1>
        <span class="ln"><span>バラバラの作業を、</span></span>
        <span class="ln"><span><em>ひとつの仕組み</em>に。</span></span>
      </h1>
      <p class="lead rv d1">Web・Map・SNS・問い合わせ・管理・返信。別々だった店舗の業務を、AIでつないで自動で回します。</p>
      <div class="actions rv d2">
        <a class="btn btn--fill" data-mag href="#"><span>無料相談する</span></a>
        <a class="btn btn--ghost" data-mag href="#"><span>仕組みを見る</span></a>
      </div>
    </div>
  </section>

  <div class="sw" id="sw"><span class="sw__t">配色を選ぶ — Color & Background</span></div>

<script type="module">
  import * as THREE from "three";
  const hx=s=>parseInt(s.slice(1),16);
  const PALETTES=[
    {key:'white', label:'White', css:{paper:'#ffffff',ink:'#14161a',soft:'#5b626c',mint:'#12b39a',blue:'#3b6df0',lav:'#7b6cf0'}},
    {key:'aqua',  label:'Aqua',  css:{paper:'#f3f2ee',ink:'#14161a',soft:'#5b626c',mint:'#16b89a',blue:'#3f6df0',lav:'#7b6cf0'}},
    {key:'cream', label:'Cream', css:{paper:'#f5f1ea',ink:'#1f1a14',soft:'#6b6056',mint:'#f5a623',blue:'#ff7a59',lav:'#8b6cf0'}},
    {key:'mist',  label:'Mist',  css:{paper:'#e9edf3',ink:'#14152a',soft:'#525872',mint:'#38bdf8',blue:'#4f46e5',lav:'#7c3aed'}},
    {key:'sand',  label:'Sand',  css:{paper:'#ece4d5',ink:'#2a2117',soft:'#6f6354',mint:'#0e9aa0',blue:'#d98a3d',lav:'#b0673a'}},
    {key:'navy',  label:'Navy', dark:true, css:{paper:'#0d1b2e',ink:'#e6eefb',soft:'#8aa0bd',mint:'#5fe3c1',blue:'#5b9bff',lav:'#9b8cff'}},
    {key:'night', label:'Night', dark:true, css:{paper:'#0b0f17',ink:'#eef2f6',soft:'#8b97a5',mint:'#5fe3c1',blue:'#4a8dff',lav:'#9b8cff'}},
    {key:'espresso',label:'Espresso', dark:true, css:{paper:'#17120d',ink:'#f4ece0',soft:'#a79a87',mint:'#f5a623',blue:'#ff7a45',lav:'#d98cf0'}},
  ];

  const fine=matchMedia('(hover:hover) and (pointer:fine)').matches, reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const ptr={x:innerWidth/2,y:innerHeight/2,nx:0,ny:0};
  addEventListener('pointermove',e=>{ptr.x=e.clientX;ptr.y=e.clientY;ptr.nx=e.clientX/innerWidth-.5;ptr.ny=e.clientY/innerHeight-.5;},{passive:true});
  if(fine&&!reduce){const cur=document.getElementById('cur'),dot=cur.querySelector('i'),ring=cur.querySelector('b');let rx=ptr.x,ry=ptr.y;
    (function f(){dot.style.transform=`translate(${ptr.x}px,${ptr.y}px) translate(-50%,-50%)`;rx+=(ptr.x-rx)*.18;ry+=(ptr.y-ry)*.18;ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;requestAnimationFrame(f);})();
    document.addEventListener('pointerover',e=>{if(e.target.closest('a,button,[data-mag]'))cur.classList.add('hov');});
    document.addEventListener('pointerout',e=>{if(e.target.closest('a,button,[data-mag]'))cur.classList.remove('hov');});
    document.querySelectorAll('[data-mag]').forEach(el=>{el.style.transition='transform .4s cubic-bezier(.16,1,.3,1)';
      el.addEventListener('pointermove',e=>{const r=el.getBoundingClientRect();el.style.transform=`translate(${(e.clientX-(r.left+r.width/2))*.4}px,${(e.clientY-(r.top+r.height/2))*.4}px)`;});
      el.addEventListener('pointerleave',()=>el.style.transform='');});}
  requestAnimationFrame(()=>document.querySelectorAll('h1 .ln').forEach(l=>l.classList.add('in')));
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.2});
  document.querySelectorAll('.rv').forEach(el=>io.observe(el));
  const hd=document.getElementById('hd');addEventListener('scroll',()=>hd.classList.toggle('scr',scrollY>40),{passive:true});

  const swWrap=document.getElementById('sw');
  const chips=PALETTES.map((p,i)=>{const btn=document.createElement('button');btn.className='chip';btn.type='button';
    btn.innerHTML=`<b style="background:${p.css.paper};border-color:color-mix(in srgb,${p.css.ink} 18%,transparent)"><u style="background:conic-gradient(from 200deg, ${p.css.mint}, ${p.css.blue}, ${p.css.lav}, ${p.css.mint})"></u></b><small>${p.label}</small>`;
    btn.addEventListener('click',()=>apply(i));swWrap.appendChild(btn);return btn;});

  // ===== 3D: ラベル付きワークフロー =====
  let pm,pb,nodeMats=[],haloMats=[],lineMat,pulseMats=[];
  try{
  const canvas=document.getElementById('gl');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(45,1,0.1,100);cam.position.set(0,0,9);
  scene.add(new THREE.HemisphereLight(0xffffff,0xe6ebf2,1.05));
  const dl=new THREE.DirectionalLight(0xffffff,1.0);dl.position.set(4,6,8);scene.add(dl);
  pm=new THREE.PointLight(0x16b89a,22,40);pm.position.set(-5,3,4);scene.add(pm);
  pb=new THREE.PointLight(0x3f6df0,20,40);pb.position.set(5,-3,4);scene.add(pb);
  const group=new THREE.Group();group.position.x=1.8;scene.add(group);
  const steps=[
    {t:'集客',p:[-3.2,1.4,-0.6]},{t:'問い合わせ',p:[-1.5,-0.6,0.8]},{t:'管理',p:[0.3,1.2,-0.4]},
    {t:'返信',p:[2.0,-0.8,0.7]},{t:'改善',p:[3.4,1.0,-0.5]},
  ];
  function label(text){const c=document.createElement('canvas');c.width=256;c.height=96;const x=c.getContext('2d');
    x.fillStyle='rgba(255,255,255,.92)';x.beginPath();x.roundRect(8,26,240,44,22);x.fill();
    x.strokeStyle='rgba(20,22,26,.12)';x.lineWidth=2;x.stroke();
    x.fillStyle='#14161a';x.font='700 30px "Zen Kaku Gothic New",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(text,128,49);
    const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));sp.scale.set(1.7,0.64,1);return sp;}
  const nodes=[];
  steps.forEach((s,i)=>{const g=new THREE.Group();g.position.set(...s.p);
    const nm=new THREE.MeshStandardMaterial({color:0x16b89a,roughness:.25,metalness:.3,emissive:0x16b89a,emissiveIntensity:.28,flatShading:true});
    const sph=new THREE.Mesh(new THREE.IcosahedronGeometry(0.42,1),nm);g.add(sph);nodeMats.push(nm);
    const hm=new THREE.MeshBasicMaterial({color:0x16b89a,transparent:true,opacity:.10});
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.62,24,24),hm));haloMats.push(hm);
    const lb=label(s.t);lb.position.set(0,0.95,0);g.add(lb);
    g.userData={ph:i*1.1,base:s.p};group.add(g);nodes.push(g);});
  const linePts=steps.map(s=>new THREE.Vector3(...s.p));
  const curve=new THREE.CatmullRomCurve3(linePts,false,'catmullrom',0.4);
  lineMat=new THREE.LineBasicMaterial({color:0x0e9ab1,transparent:true,opacity:.4});
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(120)),lineMat));
  const pulses=[];
  for(let k=0;k<3;k++){const pmat=new THREE.MeshBasicMaterial({color:0x3f6df0});const m=new THREE.Mesh(new THREE.SphereGeometry(0.12,16,16),pmat);group.add(m);pulses.push(m);pulseMats.push(pmat);}
  function rs(){const r=canvas.getBoundingClientRect();renderer.setSize(r.width,r.height,false);cam.aspect=r.width/r.height;cam.updateProjectionMatrix();
    const small=r.width<860;group.position.x=small?-0.2:1.8;group.scale.setScalar(small?0.72:1);}
  rs();addEventListener('resize',rs);
  let rx=0,ry=0;
  function loop(t){t=(t||0)/1000;rx+=((ptr.nx*0.5)-rx)*.05;ry+=((ptr.ny*0.4)-ry)*.05;
    group.rotation.y=Math.sin(t*0.16)*0.22+rx;group.rotation.x=-0.02-ry;
    nodes.forEach(n=>{n.position.y=n.userData.base[1]+Math.sin(t*0.9+n.userData.ph)*0.12;n.children[0].rotation.y=t*0.5+n.userData.ph;n.children[0].rotation.x=t*0.3;});
    pulses.forEach((m,k)=>{const u=((t*0.12+k/3)%1);m.position.copy(curve.getPointAt(u));m.scale.setScalar(0.6+Math.sin(u*Math.PI)*0.8);});
    renderer.render(scene,cam);if(!reduce)requestAnimationFrame(loop);}
  loop(0);
  }catch(e){console.warn('3D背景を初期化できませんでした。',e);}

  const root=document.documentElement.style;
  function apply(i){const p=PALETTES[i];
    root.setProperty('--paper',p.css.paper);root.setProperty('--ink',p.css.ink);root.setProperty('--ink-soft',p.css.soft);
    root.setProperty('--mint',p.css.mint);root.setProperty('--blue',p.css.blue);root.setProperty('--lav',p.css.lav);
    chips.forEach((c,j)=>c.classList.toggle('on',j===i));
    if(pm){pm.color.setHex(hx(p.css.mint));pb.color.setHex(hx(p.css.blue));
      const cyc=[hx(p.css.mint),hx(p.css.blue),hx(p.css.lav),hx(p.css.mint),hx(p.css.blue)];
      nodeMats.forEach((m,k)=>{m.color.setHex(cyc[k]);m.emissive.setHex(cyc[k]);m.emissiveIntensity=p.dark?0.5:0.28;});
      haloMats.forEach((m,k)=>{m.color.setHex(cyc[k]);m.opacity=p.dark?0.16:0.10;});
      lineMat.color.setHex(hx(p.css.blue));lineMat.opacity=p.dark?0.55:0.40;
      pulseMats.forEach(m=>m.color.setHex(hx(p.css.blue)));}
  }
  apply(1); // 既定: Aqua
</script>
</body>
</html>

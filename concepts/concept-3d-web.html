<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NosTechnology｜3D Motif A — 制作力（UIパネル）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<style>
  :root{
    --paper:#f3f2ee; --ink:#14161a; --ink-soft:#5b626c;
    --mint:#16b89a; --teal:#0e9ab1; --blue:#3f6df0; --lav:#7b6cf0;
    --line:rgba(20,22,26,.12);
    --en:"Space Grotesk", sans-serif; --jp:"Zen Kaku Gothic New", system-ui, sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;margin:0;}
  body{background:var(--paper);color:var(--ink);font-family:var(--jp);line-height:1.85;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-feature-settings:"palt" 1;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--ink);color:var(--paper);}
  @media(hover:hover)and(pointer:fine){body,a,button,[data-mag]{cursor:none;}}
  .cur{position:fixed;top:0;left:0;z-index:60;pointer-events:none;}
  .cur i,.cur b{position:absolute;border-radius:50%;transform:translate(-50%,-50%);}
  .cur i{width:6px;height:6px;background:var(--ink);}
  .cur b{width:38px;height:38px;border:1px solid rgba(20,22,26,.35);transition:width .3s,height .3s,background .3s,border-color .3s;}
  .cur.hov b{width:64px;height:64px;background:rgba(20,22,26,.06);border-color:transparent;}.cur.hov i{opacity:0;}
  @media(hover:none),(pointer:coarse){.cur{display:none;}}
  header{position:fixed;inset:0 0 auto 0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:24px clamp(22px,5vw,72px);transition:.4s var(--ease);}
  header.scr{padding-top:14px;padding-bottom:14px;background:rgba(243,242,238,.7);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;}
  .brand i{width:22px;height:22px;border-radius:7px;background:conic-gradient(from 200deg,var(--mint),var(--blue),var(--lav),var(--mint));}
  nav{display:flex;gap:30px;font-family:var(--en);font-size:.9rem;color:var(--ink-soft);}
  nav a:hover{color:var(--ink);}
  .ncta{padding:9px 20px;border-radius:999px;border:1px solid var(--ink);color:var(--ink);transition:.35s var(--ease);}
  .ncta:hover{background:var(--ink);color:var(--paper);}
  @media(max-width:820px){nav .lnk{display:none;}}
  .hero{position:relative;min-height:100svh;display:flex;align-items:center;padding:140px clamp(22px,5vw,72px) 90px;overflow:hidden;}
  .hero__gl{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
  .hero__c{position:relative;z-index:2;max-width:600px;pointer-events:none;}
  .hero__c a,.hero__c [data-mag]{pointer-events:auto;}
  .badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--en);font-size:.78rem;letter-spacing:.04em;
    padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.6);border:1px solid var(--line);backdrop-filter:blur(6px);
    color:var(--ink-soft);margin-bottom:24px;}
  .badge i{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 10px var(--mint);}
  h1{font-weight:900;font-size:clamp(2.8rem,8vw,6.4rem);line-height:1.04;letter-spacing:.004em;margin-bottom:28px;}
  h1 .ln{display:block;overflow:hidden;}
  h1 .ln>span{display:inline-block;transform:translateY(110%);transition:transform 1s var(--ease);}
  h1 .ln.in>span{transform:none;}h1 .ln:nth-child(2)>span{transition-delay:.1s;}
  h1 em{font-style:normal;background:linear-gradient(110deg,var(--mint),var(--blue),var(--lav));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .lead{max-width:480px;color:var(--ink-soft);font-size:clamp(1rem,1.4vw,1.12rem);margin-bottom:36px;}
  .actions{display:flex;flex-wrap:wrap;gap:14px;}
  .btn{position:relative;display:inline-flex;align-items:center;gap:9px;padding:16px 30px;border-radius:999px;font-weight:600;font-size:.98rem;border:1px solid transparent;overflow:hidden;isolation:isolate;transition:color .4s var(--ease),border-color .4s var(--ease);}
  .btn>span{position:relative;z-index:1;}
  .btn::before{content:"";position:absolute;inset:0;z-index:0;transform:scaleY(0);transform-origin:bottom;transition:transform .45s var(--ease);}
  .btn:hover::before{transform:scaleY(1);}
  .btn--fill{background:var(--ink);color:var(--paper);}.btn--fill::before{background:linear-gradient(120deg,var(--mint),var(--blue));}.btn--fill:hover{color:#06231d;}
  .btn--ghost{border-color:var(--line);color:var(--ink);}.btn--ghost::before{background:var(--ink);}.btn--ghost:hover{color:var(--paper);border-color:var(--ink);}
  .hero__foot{position:absolute;left:clamp(22px,5vw,72px);right:clamp(22px,5vw,72px);bottom:30px;z-index:2;display:flex;justify-content:space-between;font-family:var(--en);font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);}
  .rv{opacity:0;transform:translateY(24px);transition:.9s var(--ease);}.rv.in{opacity:1;transform:none;}
  .rv.d1{transition-delay:.25s;}.rv.d2{transition-delay:.4s;}
  @media(prefers-reduced-motion:reduce){.rv,h1 .ln>span{opacity:1!important;transform:none!important;}.cur{display:none;}body{cursor:auto;}}
</style>
</head>
<body>
  <div class="cur" id="cur"><i></i><b></b></div>
  <header id="hd">
    <a class="brand" data-mag href="#"><i></i> NosTechnology</a>
    <nav><a class="lnk" href="#">Services</a><a class="lnk" href="#">3万円Web</a><a class="lnk" href="#">Works</a><a class="ncta" data-mag href="#">無料相談</a></nav>
  </header>

  <section class="hero">
    <canvas class="hero__gl" id="gl" aria-hidden="true"></canvas>
    <div class="hero__c">
      <span class="badge rv"><i></i> Web・管理画面を、AIでつくる</span>
      <h1>
        <span class="ln"><span>人の時間を、</span></span>
        <span class="ln"><span><em>AI</em>でつくる。</span></span>
      </h1>
      <p class="lead rv d1">店舗ページ、予約・顧客の管理画面、AI返信、地図導線。必要な仕組みを、まとめて設計・制作します。</p>
      <div class="actions rv d2">
        <a class="btn btn--fill" data-mag href="#"><span>無料相談する</span></a>
        <a class="btn btn--ghost" data-mag href="#"><span>制作物を見る</span></a>
      </div>
    </div>
    <div class="hero__foot"><span>Web · AI · System</span><span>Realtime 3D</span></div>
  </section>

<script type="module">
  import * as THREE from "three";
  const fine=matchMedia('(hover:hover) and (pointer:fine)').matches, reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const ptr={x:innerWidth/2,y:innerHeight/2,nx:0,ny:0};
  addEventListener('pointermove',e=>{ptr.x=e.clientX;ptr.y=e.clientY;ptr.nx=e.clientX/innerWidth-.5;ptr.ny=e.clientY/innerHeight-.5;},{passive:true});
  if(fine&&!reduce){const cur=document.getElementById('cur'),dot=cur.querySelector('i'),ring=cur.querySelector('b');let rx=ptr.x,ry=ptr.y;
    (function f(){dot.style.transform=`translate(${ptr.x}px,${ptr.y}px) translate(-50%,-50%)`;rx+=(ptr.x-rx)*.18;ry+=(ptr.y-ry)*.18;ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;requestAnimationFrame(f);})();
    document.addEventListener('pointerover',e=>{if(e.target.closest('a,button,[data-mag]'))cur.classList.add('hov');});
    document.addEventListener('pointerout',e=>{if(e.target.closest('a,button,[data-mag]'))cur.classList.remove('hov');});
    document.querySelectorAll('[data-mag]').forEach(el=>{el.style.transition='transform .4s cubic-bezier(.16,1,.3,1)';
      el.addEventListener('pointermove',e=>{const r=el.getBoundingClientRect();el.style.transform=`translate(${(e.clientX-(r.left+r.width/2))*.4}px,${(e.clientY-(r.top+r.height/2))*.4}px)`;});
      el.addEventListener('pointerleave',()=>el.style.transform='');});}
  requestAnimationFrame(()=>document.querySelectorAll('h1 .ln').forEach(l=>l.classList.add('in')));
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.2});
  document.querySelectorAll('.rv').forEach(el=>io.observe(el));
  const hd=document.getElementById('hd');addEventListener('scroll',()=>hd.classList.toggle('scr',scrollY>40),{passive:true});

  // ===== 3D: 浮遊するUIパネル（店舗サイト / 管理画面 / AI返信 / 地図）=====
  try{
  const canvas=document.getElementById('gl');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(42,1,0.1,100);cam.position.set(0,0,9);
  // ライティング（白地に映える柔らかい光＋ブランド色のリム）
  scene.add(new THREE.HemisphereLight(0xffffff,0xdfe6ee,1.05));
  const dir=new THREE.DirectionalLight(0xffffff,1.1);dir.position.set(4,6,8);scene.add(dir);
  const p1=new THREE.PointLight(0x16b89a,18,30);p1.position.set(-6,3,4);scene.add(p1);
  const p2=new THREE.PointLight(0x3f6df0,16,30);p2.position.set(6,-3,5);scene.add(p2);

  // 角丸パネルのジオメトリ
  function roundedRect(w,h,r){const s=new THREE.Shape();const x=-w/2,y=-h/2;
    s.moveTo(x+r,y);s.lineTo(x+w-r,y);s.quadraticCurveTo(x+w,y,x+w,y+r);s.lineTo(x+w,y+h-r);
    s.quadraticCurveTo(x+w,y+h,x+w-r,y+h);s.lineTo(x+r,y+h);s.quadraticCurveTo(x,y+h,x,y+h-r);
    s.lineTo(x,y+r);s.quadraticCurveTo(x,y,x+r,y);return s;}
  function panelGeo(w,h){const g=new THREE.ExtrudeGeometry(roundedRect(w,h,.18),{depth:.12,bevelEnabled:true,bevelThickness:.04,bevelSize:.04,bevelSegments:2});g.center();return g;}

  // CanvasTextureでUIモックを描く
  function uiTexture(kind){
    const c=document.createElement('canvas');c.width=512;c.height=384;const x=c.getContext('2d');
    x.fillStyle='#ffffff';x.fillRect(0,0,512,384);
    const mint='#16b89a',blue='#3f6df0',ink='#14161a',soft='#aab2bd',bg='#eef1f4';
    const bar=(yy,ww,col,h=14)=>{x.fillStyle=col;x.beginPath();x.roundRect(36,yy,ww,h,7);x.fill();};
    // 上部バー
    x.fillStyle=bg;x.fillRect(0,0,512,54);x.fillStyle=mint;x.beginPath();x.arc(40,27,9,0,7);x.fill();
    x.fillStyle=ink;x.font='600 18px sans-serif';x.fillText({site:'STORE SITE',admin:'予約 / 顧客 管理',reply:'AI 返信アシスト',map:'店舗マップ導線'}[kind],62,33);
    if(kind==='site'){x.fillStyle=ink;x.font='800 44px sans-serif';x.fillText('Beauty',36,140);x.fillText('Salon',36,188);
      bar(220,260,soft,12);bar(244,200,soft,12);x.fillStyle=mint;x.beginPath();x.roundRect(36,288,150,46,23);x.fill();
      x.fillStyle='#fff';x.font='700 18px sans-serif';x.fillText('予約する',74,316);
      x.fillStyle=bg;x.beginPath();x.roundRect(320,96,156,238,16);x.fill();}
    else if(kind==='admin'){for(let i=0;i<5;i++){x.fillStyle=i%2?'#f6f8fa':'#fff';x.fillRect(36,84+i*46,440,46);
      x.fillStyle=i===1?mint:soft;x.beginPath();x.arc(60,107+i*46,8,0,7);x.fill();
      bar(98+i*46,180,'#cdd4dc',10);x.fillStyle=blue;x.beginPath();x.roundRect(360,96+i*46,110,22,11);x.fill();}}
    else if(kind==='reply'){x.fillStyle=bg;x.beginPath();x.roundRect(36,80,300,52,16);x.fill();
      bar(98,210,'#cdd4dc',10);x.fillStyle=blue;x.beginPath();x.roundRect(150,160,326,120,16);x.fill();
      x.fillStyle='#fff';x.font='600 16px sans-serif';x.fillText('ご予約ありがとうございます。',172,196);x.fillText('当日は10分前にご来店ください。',172,224);
      x.fillStyle=mint;x.font='700 14px sans-serif';x.fillText('✦ AI が文案を生成',172,262);}
    else{x.fillStyle=bg;x.fillRect(36,72,440,250);x.strokeStyle='#d7dde4';x.lineWidth=2;
      for(let i=0;i<6;i++){x.beginPath();x.moveTo(36,100+i*40);x.lineTo(476,100+i*40);x.stroke();}
      x.fillStyle=blue;x.beginPath();x.arc(300,200,16,0,7);x.fill();x.fillStyle='rgba(63,109,240,.2)';x.beginPath();x.arc(300,200,40,0,7);x.fill();
      x.fillStyle=mint;x.beginPath();x.moveTo(300,176);x.lineTo(312,200);x.lineTo(288,200);x.closePath();x.fill();}
    const t=new THREE.CanvasTexture(c);t.anisotropy=4;t.colorSpace=THREE.SRGBColorSpace;return t;
  }

  const group=new THREE.Group();group.position.x=1.4;scene.add(group);
  const defs=[
    {kind:'site', w:3.4,h:2.55,pos:[0.2,0.5,0],rot:[-.12,-.5,.04]},
    {kind:'admin',w:3.0,h:2.25,pos:[-1.7,-0.9,-1.2],rot:[-.05,.35,-.05]},
    {kind:'reply',w:2.7,h:2.0,pos:[2.0,-1.0,-0.6],rot:[.04,-.7,.02]},
    {kind:'map',  w:2.4,h:1.8,pos:[-2.2,1.4,-1.8],rot:[-.1,.5,.03]},
  ];
  const panels=defs.map(d=>{
    const geo=panelGeo(d.w,d.h);
    const face=new THREE.MeshStandardMaterial({map:uiTexture(d.kind),roughness:.35,metalness:.0});
    const side=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.25,metalness:.1});
    // ExtrudeGeometryは前面(0)/側面(1)で材質を分けられる
    const mesh=new THREE.Mesh(geo,[face,side]);
    mesh.position.set(...d.pos);mesh.rotation.set(...d.rot);mesh.userData.baseY=d.pos[1];mesh.userData.ph=Math.random()*6;
    group.add(mesh);return mesh;
  });

  function rs(){const r=canvas.getBoundingClientRect();renderer.setSize(r.width,r.height,false);cam.aspect=r.width/r.height;cam.updateProjectionMatrix();
    // 画面が狭いときはパネル群を中央寄せ＆縮小
    const small=r.width<820;group.position.x=small?0:1.4;group.scale.setScalar(small?0.82:1);}
  rs();addEventListener('resize',rs);
  let rx=0,ry=0;
  function loop(t){t=(t||0)/1000;
    rx+=((ptr.nx*0.5)-rx)*.05;ry+=((ptr.ny*0.4)-ry)*.05;
    group.rotation.y=Math.sin(t*0.18)*0.18 + rx;
    group.rotation.x=-0.04 + Math.sin(t*0.22)*0.04 - ry;
    panels.forEach((m,i)=>{m.position.y=m.userData.baseY+Math.sin(t*0.7+m.userData.ph)*0.12;m.rotation.z=Math.sin(t*0.3+i)*0.02;});
    renderer.render(scene,cam);if(!reduce)requestAnimationFrame(loop);}
  loop(0);
  }catch(e){console.warn('3D背景を初期化できませんでした。白地で表示します。',e);}
</script>
</body>
</html>
